[package]
name = "hibana-mgmt"
version = "0.1.0"
edition = "2024"
description = "Management prefixes and payload owners for hibana"
license = "MIT OR Apache-2.0"
repository = "https://github.com/hibanaworks/hibana-mgmt"
homepage = "https://github.com/hibanaworks/hibana-mgmt"
documentation = "https://docs.rs/hibana-mgmt"
readme = "README.md"

[features]
default = []
std = ["hibana/std"]

[dependencies]
hibana = { git = "https://github.com/hibanaworks/hibana", rev = "5158dc0ba669baa78b292585036334e4fcc0f090", default-features = false }
hibana-epf = { git = "https://github.com/hibanaworks/hibana-epf", rev = "45771f9a2892e4a173aaf42e5eca88dddedf61b5", default-features = false }
