[package]
name = "hibana-mgmt"
version = "0.1.0"
edition = "2024"
description = "Management prefixes and payload owners for hibana"
license = "MIT OR Apache-2.0"
repository = "https://github.com/hibanaworks/hibana-mgmt"
homepage = "https://github.com/hibanaworks/hibana-mgmt"
documentation = "https://docs.rs/hibana-mgmt"
readme = "README.md"

[features]
default = []
std = ["hibana/std"]

[dependencies]
hibana = { git = "https://github.com/hibanaworks/hibana", rev = "dbad661f3bcb9be17f23ca7c1764a9649f0487b7", default-features = false }
hibana-epf = { git = "https://github.com/hibanaworks/hibana-epf", rev = "5cffa1e5726e4c41d2927859d1a8e37e76233b5d", default-features = false }
