[package]
name = "hibana-mgmt"
version = "0.1.0"
edition = "2024"
description = "Management prefixes and payload owners for hibana"
license = "MIT OR Apache-2.0"
repository = "https://github.com/hibanaworks/hibana-mgmt"
homepage = "https://github.com/hibanaworks/hibana-mgmt"
documentation = "https://docs.rs/hibana-mgmt"
readme = "README.md"

[features]
default = []
std = ["hibana/std"]

[dependencies]
hibana = { git = "https://github.com/hibanaworks/hibana", rev = "53fe08fe5169fd5bb2f3012ef83e1ac8a221b081", default-features = false }
hibana-epf = { git = "https://github.com/hibanaworks/hibana-epf", rev = "2f4fd88c64c7acf8fc31a5f27a0cbdb6872df1fd", default-features = false }
