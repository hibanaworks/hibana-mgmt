[package]
name = "hibana-mgmt"
version = "0.1.0"
edition = "2024"
description = "Management prefixes and payload owners for hibana"
license = "MIT OR Apache-2.0"
repository = "https://github.com/hibanaworks/hibana-mgmt"
homepage = "https://github.com/hibanaworks/hibana-mgmt"
documentation = "https://docs.rs/hibana-mgmt"
readme = "README.md"

[features]
default = []
std = ["hibana/std"]

[dependencies]
hibana = { git = "https://github.com/hibanaworks/hibana", rev = "9b95d66eaed007629a72f01b5f58666f1dd70786", default-features = false }
hibana-epf = { git = "https://github.com/hibanaworks/hibana-epf", rev = "069b30ea961ecb1cae91b190685119d852f55dbc", default-features = false }
