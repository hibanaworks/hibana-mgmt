[package]
name = "hibana-mgmt"
version = "0.1.0"
edition = "2024"
description = "Management prefixes and payload owners for hibana"
license = "MIT OR Apache-2.0"
repository = "https://github.com/hibanaworks/hibana-mgmt"
homepage = "https://github.com/hibanaworks/hibana-mgmt"
documentation = "https://docs.rs/hibana-mgmt"
readme = "README.md"

[features]
default = []
std = ["hibana/std"]

[dependencies]
hibana = { git = "https://github.com/hibanaworks/hibana", rev = "e254bd2cc8a58452e50cbf069bed5293f0df042c", default-features = false }
hibana-epf = { git = "https://github.com/hibanaworks/hibana-epf", rev = "73744b159af0daf68ed3918d3295ece357844aa4", default-features = false }
