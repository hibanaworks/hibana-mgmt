[package]
name = "hibana-mgmt"
version = "0.1.0"
edition = "2024"
description = "Management prefixes and payload owners for hibana"
license = "MIT OR Apache-2.0"
repository = "https://github.com/hibanaworks/hibana-mgmt"
homepage = "https://github.com/hibanaworks/hibana-mgmt"
documentation = "https://docs.rs/hibana-mgmt"
readme = "README.md"

[features]
default = []
std = ["hibana/std"]

[dependencies]
hibana = { git = "https://github.com/hibanaworks/hibana", rev = "8f347b5becf03cdcbc3a6a0e6170e846058f36d0", default-features = false }
hibana-epf = { git = "https://github.com/hibanaworks/hibana-epf", rev = "ae2ba786c0db2ddccc59871fd577c8f66a2cba23", default-features = false }
