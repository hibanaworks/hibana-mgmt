[package]
name = "hibana-mgmt"
version = "0.1.0"
edition = "2024"
description = "Management prefixes and payload owners for hibana"
license = "MIT OR Apache-2.0"
repository = "https://github.com/hibanaworks/hibana-mgmt"
homepage = "https://github.com/hibanaworks/hibana-mgmt"
documentation = "https://docs.rs/hibana-mgmt"
readme = "README.md"

[features]
default = []
std = ["hibana/std"]

[dependencies]
hibana = { git = "https://github.com/hibanaworks/hibana", rev = "53bbf06df23262bf3f3f2c9682b985bc73b930ff", default-features = false }
hibana-epf = { git = "https://github.com/hibanaworks/hibana-epf", rev = "c3db6f0ae9c380f5915613f32ae36c00fb32d6e8", default-features = false }
