[package]
name = "hibana-mgmt"
version = "0.1.0"
edition = "2024"
description = "Management prefixes and payload owners for hibana"
license = "MIT OR Apache-2.0"
repository = "https://github.com/hibanaworks/hibana-mgmt"
homepage = "https://github.com/hibanaworks/hibana-mgmt"
documentation = "https://docs.rs/hibana-mgmt"
readme = "README.md"

[features]
default = []
std = ["hibana/std"]

[dependencies]
hibana = { git = "https://github.com/hibanaworks/hibana", rev = "4d5e89199be35de2b77e73bd8f550375c63f2e3c", default-features = false }
hibana-epf = { git = "https://github.com/hibanaworks/hibana-epf", rev = "a98036395c2793f30bbc43d1b1f4761fc6c84457", default-features = false }
