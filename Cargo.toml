[package]
name = "hibana-mgmt"
version = "0.1.0"
edition = "2024"
description = "Management prefixes and payload owners for hibana"
license = "MIT OR Apache-2.0"
repository = "https://github.com/hibanaworks/hibana-mgmt"
homepage = "https://github.com/hibanaworks/hibana-mgmt"
documentation = "https://docs.rs/hibana-mgmt"
readme = "README.md"

[features]
default = []
std = ["hibana/std"]

[dependencies]
hibana = { git = "https://github.com/hibanaworks/hibana", rev = "e94a5c53358bf27b56f632cff8e869ded3913d93", default-features = false }
hibana-epf = { git = "https://github.com/hibanaworks/hibana-epf", rev = "9ba7500528bf05f9228a5b63b5cf3425284d1e1c", default-features = false }
