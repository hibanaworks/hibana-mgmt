[package]
name = "hibana-mgmt"
version = "0.1.0"
edition = "2024"
description = "Management prefixes and payload owners for hibana"
license = "MIT OR Apache-2.0"
repository = "https://github.com/hibanaworks/hibana-mgmt"
homepage = "https://github.com/hibanaworks/hibana-mgmt"
documentation = "https://docs.rs/hibana-mgmt"
readme = "README.md"

[features]
default = []
std = ["hibana/std"]

[dependencies]
hibana = { git = "https://github.com/hibanaworks/hibana", rev = "5b0a522a85694718743b19caa1cadb470cf3a22d", default-features = false }
hibana-epf = { git = "https://github.com/hibanaworks/hibana-epf", rev = "e0a977bf969baa9aa63d6879e9878a4af80e796c", default-features = false }
