[package]
name = "hibana-mgmt"
version = "0.1.0"
edition = "2024"
description = "Management prefixes and payload owners for hibana"
license = "MIT OR Apache-2.0"
repository = "https://github.com/hibanaworks/hibana-mgmt"
homepage = "https://github.com/hibanaworks/hibana-mgmt"
documentation = "https://docs.rs/hibana-mgmt"
readme = "README.md"

[features]
default = []
std = ["hibana/std"]

[dependencies]
hibana = { git = "https://github.com/hibanaworks/hibana", rev = "ebeddd96956912dc79d528c1bb0537c28f646ad1", default-features = false }
hibana-epf = { git = "https://github.com/hibanaworks/hibana-epf", rev = "f47c5c59ef1c42c20644fd0a8d76add9b23b8851", default-features = false }
