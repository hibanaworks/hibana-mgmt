[package]
name = "hibana-mgmt"
version = "0.1.0"
edition = "2024"
description = "Management prefixes and payload owners for hibana"
license = "MIT OR Apache-2.0"
repository = "https://github.com/hibanaworks/hibana-mgmt"
homepage = "https://github.com/hibanaworks/hibana-mgmt"
documentation = "https://docs.rs/hibana-mgmt"
readme = "README.md"

[features]
default = []
std = ["hibana/std"]

[dependencies]
hibana = { git = "https://github.com/hibanaworks/hibana", rev = "a06b0a74076964c6374d00b3d11991e7d4ae1329", default-features = false }
hibana-epf = { git = "https://github.com/hibanaworks/hibana-epf", rev = "63fd300ce41801f96afb1a713f4305f5c7015261", default-features = false }
